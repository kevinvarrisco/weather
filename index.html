<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- <img src="img/Logo-Weather.png" alt=""> -->


    <div class="bg-wrap">
        <div class="bg-img"></div>
        <div class="bg-blur"></div>
        <div class="bg-overlay"></div>
    </div>

    <form class="form">
        <input type="text" id="input" placeholder="Search Location">
        <input type="submit" id="submit">
        <img src="img/search-icon.png" alt="search-icon">
    </form>
    <div class="container">
        <div class="current">
            <div class="primary">
                <div class="loc"></div>
                <div class="temp"><span></span> °C</div>
                <div class="weather">
                    <img src="img/cloud-icon.png" alt="">
                    <h1><br><span></span></h1>
                </div>
            </div>
            <div class="secondary">
                <div class="info info-feels">
                    <img src="img/feels-like-icon.png" alt="">
                    <h1>Feels Like : <span></span> °C</h1>
                </div>
                <div class="info info-wind">
                    <img src="img/wind-icon.png" alt="">
                    <h1>Wind : <span></span> m/s</h1>
                </div>
                <div class="info info-humidity">
                    <img src="img/humidity-icon.png" alt="">
                    <h1>Humidity : <span></span>%</h1>
                </div>
                <div class="info info-visibility">
                    <img src="img/visibility-icon.png" alt="">
                    <h1>Visibility : <span></span> m</h1>
                </div>
                <div class="info info-sunrise">
                    <img src="img/sunrise-icon.png" alt="">
                    <h1>Sunrise : <span> am</span></h1>
                </div>
                <div class="info info-sunset">
                    <img src="img/sunset-icon.png" alt="">
                    <h1>Sunset : <span> pm</span></h1>
                </div>
            </div>
        </div>
        <div class="map-forecast-wrap">
            <div class="map">
                <iframe src="https://www.google.com/maps?q=-8.5,115&z=8&output=embed" frameborder="0"></iframe>
            </div>
            <div class="day-forecast">DAY FORECAST<br>(COMING SOON)</div>
        </div>
    </div>

    <script src="index.js"></script>

</body>

</html>
