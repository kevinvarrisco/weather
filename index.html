<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <button>Search</button>

    <h3>Lokasi : <span>Bali</span></h3>
    <h1>Suhu : <span>24 </span>°C</h1>
    <h2>Cuaca : <span>Cerah Berawan</span></h2>

    <div class="background"></div>

    <div class="input-wrap">
        <input type="text" id="input" placeholder="Search Location">
        <img src="img/search-icon.png" alt="search-icon">
    </div>
    <div class="container">
        <div class="current">
            <div class="primary">
                <div class="loc">Denpasar, IN</div>
                <div class="temp"><span>24</span> °C</div>
                <div class="weather">
                    <img src="img/cloud-icon.png" alt="">
                    <h1>Clouds<br><span>Scattered Clouds</span></h1>
                </div>
            </div>
            <div class="secondary">
                <div class="info info-feels">
                    <img src="img/feels-like-icon.png" alt="">
                    <h1>Feels Like : <span>26</span> °C</h1>
                </div>
                <div class="info info-wind">
                    <img src="img/wind-icon.png" alt="">
                    <h1>Wind : <span>2</span> m/s</h1>
                </div>
                <div class="info info-humidity">
                    <img src="img/humidity-icon.png" alt="">
                    <h1>Humidity : <span>50</span>%</h1>
                </div>
                <div class="info info-visibility">
                    <img src="img/visibility-icon.png" alt="">
                    <h1>Visibility : <span>7000</span> m</h1>
                </div>
                <div class="info info-sunrise">
                    <img src="img/sunrise-icon.png" alt="">
                    <h1>Sunrise : <span>5:20</span> am</h1>
                </div>
                <div class="info info-sunset">
                    <img src="img/sunset-icon.png" alt="">
                    <h1>Sunset : <span>6:30</span> pm</h1>
                </div>
            </div>
        </div>
        <div class="map-forecast-wrap">
            <div class="map"></div>
            <div class="day-forecast"></div>
        </div>
    </div>

    <script src="index.js"></script>

</body>

</html>
